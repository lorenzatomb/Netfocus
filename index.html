<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Netfocus - Simples Nacional</title>
<meta name="theme-color" content="#00d68f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Netfocus"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--b0:#06080a;--b1:#0c1017;--b2:#131920;--b3:#1a2230;--bd:#1e2a3a;--t0:#e8edf4;--t1:#a0aec0;--t2:#5a6a80;--g:#00d68f;--r:#ff6370;--o:#ff9f43;--bl:#3b82f6;--p:#a78bfa;--cy:#22d3ee}
body{background:var(--b0);color:var(--t0);font-family:'Outfit',system-ui,sans-serif;padding-top:env(safe-area-inset-top)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}input[type=number]{-moz-appearance:textfield}
.hdr{background:var(--b1);border-bottom:1px solid var(--bd);padding:10px 14px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-box{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,#00d68f,#00b377);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:#fff}
.logo-txt{font-size:14px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:8px;color:var(--t2);text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.hdr-metrics{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.hdr-m{text-align:right}.hdr-m small{font-size:8px;color:var(--t2);text-transform:uppercase;font-weight:600;display:block}.hdr-m b{font-size:12px;font-family:'IBM Plex Mono',monospace;font-weight:700}
.btns{display:flex;gap:4px}
.btn{padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--bd);background:var(--b2);color:var(--t1);font-family:'Outfit',sans-serif}
.btn:active{opacity:.7}.btn-g{border-color:var(--g);color:var(--g)}.btn-r{border-color:var(--r);color:var(--r)}
.tabs{display:flex;gap:2px;margin-top:8px;background:var(--b1);border-radius:8px;padding:2px;border:1px solid var(--bd)}
.tab{flex:1;padding:7px 4px;text-align:center;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--t2);font-family:'Outfit',sans-serif}
.tab.on{background:var(--b3);color:var(--t0)}
.board{padding:12px 10px;overflow-x:auto}
.col{width:100%;max-height:calc(100vh - 130px);overflow-y:auto;padding:0 2px}
.card{background:var(--b1);border:1px solid var(--bd);border-radius:12px;margin-bottom:8px;overflow:hidden}
.card-h{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.card-h:active{background:var(--b2)}
.card-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--t1);letter-spacing:.3px}
.card-b{padding:12px 14px}
.row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--b3)}
.row:last-child{border:none}
.row-l{color:var(--t2);font-size:11px;font-weight:500}
.row-v{font-size:12px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.inp-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0;gap:6px}
.inp-row label{color:var(--t2);font-size:11px;font-weight:500;flex:1}
.inp{background:var(--b0);border:1px solid var(--bd);border-radius:6px;color:var(--t0);font-size:11px;font-family:'IBM Plex Mono',monospace;padding:4px 8px;width:70px;text-align:right;outline:none}
.inp:focus{border-color:var(--bl)}
.prd{background:var(--b2);border-radius:10px;padding:10px;margin-bottom:6px;border:1px solid var(--bd)}
.prd-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.prd-name{font-size:12px;font-weight:600;color:var(--t0)}
.prd-sub{font-size:9px;color:var(--t2);font-family:'IBM Plex Mono',monospace;margin-top:1px}
.prd-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.prd-grid small{font-size:8px;color:var(--t2);text-transform:uppercase;font-weight:600;display:block;margin-bottom:2px}
.prd-grid .val{font-size:11px;font-family:'IBM Plex Mono',monospace}
.prd-foot{display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--bd);flex-wrap:wrap;gap:4px}
.prd-foot div small{font-size:8px;color:var(--t2);display:block}
.prd-foot div .val{font-size:10px;font-family:'IBM Plex Mono',monospace;font-weight:700}
.tag{display:inline-flex;padding:2px 7px;border-radius:12px;font-size:9px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.bar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bar-row span:first-child{color:var(--t2);font-size:9px;width:60px;font-weight:500}
.bar-track{flex:1;height:6px;background:var(--b0);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s ease}
.bar-row span:last-child{font-size:9px;font-family:'IBM Plex Mono',monospace;font-weight:600;width:45px;text-align:right}
.summary{padding:10px;background:var(--b1);border-radius:10px;border:1px solid var(--bd);margin-bottom:8px}
.summary-head{display:flex;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:8px}
.summary-head div small{font-size:8px;color:var(--t2);text-transform:uppercase;font-weight:600;display:block}
.summary-head div .val{font-size:13px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.add-btn{width:100%;padding:8px;border-radius:8px;border:1px dashed var(--g);background:transparent;color:var(--g);font-size:11px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif}
.del-btn{background:none;border:1px solid var(--r);border-radius:4px;padding:2px 5px;cursor:pointer;color:var(--r);font-size:10px;line-height:1}
.empty{text-align:center;padding:24px;color:var(--t2);font-size:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--b3);border:1px solid var(--g);color:var(--g);padding:8px 20px;border-radius:8px;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.highlight{padding:8px;background:#00d68f15;border-radius:8px;border:1px solid #00d68f33;margin-top:6px}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>

<script>
// ─── DATA ───
const BRL=v=>(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const PCT=v=>((v||0)*100).toFixed(2)+'%';
const PCTS=v=>((v||0)*100).toFixed(1)+'%';

const AI=[{mn:0,mx:180000,a:.04,d:0,l:'Ate 180k'},{mn:180000.01,mx:360000,a:.073,d:5940,l:'180-360k'},{mn:360000.01,mx:720000,a:.095,d:13860,l:'360-720k'},{mn:720000.01,mx:1800000,a:.107,d:22500,l:'720k-1.8mi'},{mn:1800000.01,mx:3600000,a:.143,d:87300,l:'1.8-3.6mi'},{mn:3600000.01,mx:4800000,a:.19,d:378000,l:'3.6-4.8mi'}];
const AIII=[{mn:0,mx:180000,a:.06,d:0,l:'Ate 180k'},{mn:180000.01,mx:360000,a:.112,d:9360,l:'180-360k'},{mn:360000.01,mx:720000,a:.135,d:17640,l:'360-720k'},{mn:720000.01,mx:1800000,a:.16,d:35640,l:'720k-1.8mi'},{mn:1800000.01,mx:3600000,a:.21,d:125640,l:'1.8-3.6mi'},{mn:3600000.01,mx:4800000,a:.33,d:648000,l:'3.6-4.8mi'}];

function fx(r,t){for(let f of t)if(r>=f.mn&&r<=f.mx)return f;return t[t.length-1]}
function ae(r,t){if(!r)return 0;let f=fx(r,t);return(r*f.a-f.d)/r}

let state={
  costs:{rbt12:857550,com_hw:0,frt_hw:2,fin_hw:0,par_hw:0,out_hw:0,com_sw:0,frt_sw:0,fin_sw:0,cf_hw:5,cf_sw:0,mg_hw:20,mg_sw:20,jm:0,parc:0},
  hw:[
    {id:1,f:'Logitech',d:'Camera All-In-One',q:2,v:6029.30,mx:19000,dp:0},
    {id:2,f:'Logitech',d:'Kit Multimidia',q:2,v:266.99,mx:825,dp:0},
    {id:3,f:'TCL',d:'TV 55 pol c/ suporte',q:1,v:2343.91,mx:3611,dp:0},
    {id:4,f:'BenQ',d:'Apresentador Wifi',q:1,v:4345,mx:6693,dp:0},
    {id:5,f:'Zoom',d:'Licenca Videoconf.',q:3,v:3404.98,mx:16000,dp:0},
    {id:6,f:'JBL',d:'Caixas Acusticas',q:4,v:2120,mx:14000,dp:0},
  ],
  sw:[],
  sv:[
    {id:30,f:'NETFOCUS',d:'Instalacao - Sala reunioes',q:1,v:14900,mx:22000,dp:0},
    {id:31,f:'NETFOCUS',d:'Instalacao - Auditorio 1',q:1,v:14900,mx:25000,dp:0},
    {id:32,f:'NETFOCUS',d:'Instalacao - Auditorio 2',q:1,v:23000,mx:141000,dp:0},
    {id:33,f:'NETFOCUS',d:'Treinamento Operacao',q:1,v:17900,mx:30000,dp:0},
  ],
  tab:0,
  collapsed:{cvhw:1,cvsw:1,prazo:1,tabela:1}
};

// Load saved
try{let s=localStorage.getItem('nf3');if(s){let d=JSON.parse(s);Object.assign(state,d)}}catch(e){}

function save(){try{localStorage.setItem('nf3',JSON.stringify(state));toast('Salvo!')}catch(e){}}
function reset(){if(!confirm('Resetar?'))return;localStorage.removeItem('nf3');location.reload()}

function toast(m){let t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500)}

// ─── COMPUTE ───
function calc(){
  let c=state.costs;
  let ah=ae(c.rbt12,AI),as=ae(c.rbt12,AIII);
  let cvh=ah+(c.com_hw+c.frt_hw+c.fin_hw+c.par_hw+c.out_hw)/100;
  let cvs=as+(c.com_sw+c.frt_sw+c.fin_sw)/100;
  let mkh=1/(1-(cvh+c.cf_hw/100+c.mg_hw/100));
  let mks=1/(1-(cvs+c.cf_sw/100+c.mg_sw/100));
  
  let catCalc=(items,mk)=>{let b=0,s=0;items.forEach(p=>{let u=p.dp>0?p.v*(1-p.dp/100):p.v;b+=u*p.q;s+=Math.ceil(u*mk)*p.q});return{b,s}};
  let hw=catCalc(state.hw,mkh),sw=catCalc(state.sw,mks),sv=catCalc(state.sv,mks);
  let tB=hw.b+sw.b+sv.b,tS=hw.s+sw.s+sv.s;
  let cVH=Math.ceil(hw.s*cvh),cFH=Math.ceil(hw.s*c.cf_hw/100);
  let cVS=Math.ceil((sw.s+sv.s)*cvs),cFS=Math.ceil((sw.s+sv.s)*c.cf_sw/100);
  let tC=tB+cVH+cFH+cVS+cFS,mg=tS-tC,mp=tS>0?mg/tS:0;
  return{ah,as,cvh,cvs,mkh,mks,hw,sw,sv,tB,tS,cVH,cFH,cVS,cFS,tC,mg,mp};
}

// ─── RENDER ───
function render(){
  let cp=calc();
  let c=state.costs;
  let app=document.getElementById('app');
  
  let mgColor=cp.mp>=.2?'var(--g)':'var(--o)';
  
  let html=`
  <div class="hdr">
    <div class="hdr-row">
      <div class="logo"><div class="logo-box">N</div><div><div class="logo-txt">Netfocus</div><div class="logo-sub">Simples Nacional v2</div></div></div>
      <div class="hdr-metrics">
        <div class="hdr-m"><small>Venda</small><b style="color:var(--g)">${BRL(cp.tS)}</b></div>
        <div class="hdr-m"><small>Margem</small><b style="color:${mgColor}">${BRL(cp.mg)} (${PCT(cp.mp)})</b></div>
        <div class="btns">
          <button class="btn btn-g" onclick="save()">Salvar</button>
          <button class="btn btn-r" onclick="reset()">Reset</button>
        </div>
      </div>
    </div>
    <div class="tabs">
      ${['Custos','Hardwares','SW+Serv','Consolidado'].map((t,i)=>`<button class="tab ${state.tab===i?'on':''}" onclick="state.tab=${i};render()">${t}</button>`).join('')}
    </div>
  </div>
  <div class="board"><div class="col">`;

  // ─── TAB 0: CUSTOS ───
  if(state.tab===0){
    html+=card('Receita Bruta 12m','rbt',`
      ${irow('RBT12','rbt12',c.rbt12,'R$')}
      <div class="highlight">
        ${row('Aliq. Efet. HW',PCT(cp.ah),'var(--o)')}
        ${row('Aliq. Efet. SW',PCT(cp.as),'var(--p)')}
      </div>
    `);
    html+=card('Custos Variaveis HW','cvhw',`
      ${row('Super Simples',PCT(cp.ah),'var(--o)')}
      ${prow('Comissoes','com_hw',c.com_hw,'var(--o)')}
      ${prow('Fretes','frt_hw',c.frt_hw,'var(--o)')}
      ${prow('C. Financeiros','fin_hw',c.fin_hw,'var(--o)')}
      ${prow('Parceiro','par_hw',c.par_hw,'var(--o)')}
      ${prow('Outros','out_hw',c.out_hw,'var(--o)')}
      ${row('Total CV HW',PCT(cp.cvh),'var(--o)')}
    `);
    html+=card('Custos Variaveis SW+SV','cvsw',`
      ${row('Super Simples',PCT(cp.as),'var(--p)')}
      ${prow('Comissoes','com_sw',c.com_sw,'var(--p)')}
      ${prow('Fretes','frt_sw',c.frt_sw,'var(--p)')}
      ${prow('C. Financeiros','fin_sw',c.fin_sw,'var(--p)')}
      ${row('Total CV SW+SV',PCT(cp.cvs),'var(--p)')}
    `);
    html+=card('Custos Fixos e Margem','cfm',`
      ${prow('Custos Fixos HW','cf_hw',c.cf_hw)}
      ${prow('Custos Fixos SW','cf_sw',c.cf_sw)}
      ${prow('Margem HW','mg_hw',c.mg_hw,'var(--g)')}
      ${prow('Margem SW','mg_sw',c.mg_sw,'var(--g)')}
      <div class="highlight">
        ${row('Mark-Up HW',cp.mkh.toFixed(4)+'x','var(--g)')}
        ${row('Mark-Up SW+SV',cp.mks.toFixed(4)+'x','var(--g)')}
      </div>
    `);
    html+=card('Venda a Prazo','prazo',`
      ${prow('Juros/Mes','jm',c.jm,'var(--cy)')}
      <div class="inp-row"><label>Parcelas</label><input class="inp" type="number" min="0" value="${c.parc}" onchange="state.costs.parc=+this.value;render()" style="color:var(--cy)"></div>
    `);
  }

  // ─── TAB 1: HARDWARES ───
  if(state.tab===1){
    html+=`<div class="summary"><div class="summary-head">
      <div><small>Compra</small><div class="val" style="color:var(--t1)">${BRL(cp.hw.b)}</div></div>
      <div><small>Markup</small><div class="val" style="color:var(--p)">${cp.mkh.toFixed(2)}x</div></div>
      <div><small>Venda</small><div class="val" style="color:var(--g)">${BRL(cp.hw.s)}</div></div>
    </div></div>`;
    html+=prods(state.hw,cp.mkh,'hw');
  }

  // ─── TAB 2: SW + SERVIÇOS ───
  if(state.tab===2){
    html+=`<div style="color:var(--t2);font-size:10px;font-weight:700;text-transform:uppercase;margin-bottom:6px">Softwares (${state.sw.length})</div>`;
    html+=`<div class="summary"><div class="summary-head">
      <div><small>Compra</small><div class="val" style="color:var(--t1)">${BRL(cp.sw.b)}</div></div>
      <div><small>Markup</small><div class="val" style="color:var(--p)">${cp.mks.toFixed(2)}x</div></div>
      <div><small>Venda</small><div class="val" style="color:var(--g)">${BRL(cp.sw.s)}</div></div>
    </div></div>`;
    html+=prods(state.sw,cp.mks,'sw');
    html+=`<div style="color:var(--t2);font-size:10px;font-weight:700;text-transform:uppercase;margin:12px 0 6px">Servicos (${state.sv.length})</div>`;
    html+=`<div class="summary"><div class="summary-head">
      <div><small>Compra</small><div class="val" style="color:var(--t1)">${BRL(cp.sv.b)}</div></div>
      <div><small>Markup</small><div class="val" style="color:var(--p)">${cp.mks.toFixed(2)}x</div></div>
      <div><small>Venda</small><div class="val" style="color:var(--g)">${BRL(cp.sv.s)}</div></div>
    </div></div>`;
    html+=prods(state.sv,cp.mks,'sv');
  }

  // ─── TAB 3: CONSOLIDADO ───
  if(state.tab===3){
    html+=card('Resumo da Venda','resumo',`
      ${row('Total Compra',BRL(cp.tB),'var(--t1)')}
      ${row('Total Venda',BRL(cp.tS),'var(--g)')}
      ${row('Custos Totais',BRL(cp.tC),'var(--r)')}
      ${row('Margem (R$)',BRL(cp.mg),mgColor)}
      ${row('Margem (%)',PCT(cp.mp),mgColor)}
      <div style="margin-top:8px">
        ${bar('Hardware',cp.hw.s,cp.tS,'var(--o)')}
        ${bar('Software',cp.sw.s,cp.tS,'var(--bl)')}
        ${bar('Servico',cp.sv.s,cp.tS,'var(--p)')}
      </div>
    `);
    html+=card('Decomposicao Custos','decomp',`
      ${bar('Mercadoria',cp.tB,cp.tC,'var(--t1)')}
      ${bar('C. Fixo',cp.cFH+cp.cFS,cp.tC,'var(--bl)')}
      ${bar('C. Variavel',cp.cVH+cp.cVS,cp.tC,'var(--o)')}
      <div style="margin-top:6px">
        ${row('Mercadoria',BRL(cp.tB),'var(--t1)')}
        ${row('Custo Fixo',BRL(cp.cFH+cp.cFS),'var(--bl)')}
        ${row('Custo Variavel',BRL(cp.cVH+cp.cVS),'var(--o)')}
      </div>
    `);
    html+=card('Tabela Simples','tabela',`
      <div style="color:var(--o);font-size:10px;font-weight:700;margin-bottom:4px">ANEXO I</div>
      ${AI.map(f=>`<div class="row"><span class="row-l">${f.l}</span><span class="row-v" style="color:var(--o);font-size:10px">${PCT(f.a)} | ded ${BRL(f.d)}</span></div>`).join('')}
      <div style="color:var(--p);font-size:10px;font-weight:700;margin:8px 0 4px">ANEXO III</div>
      ${AIII.map(f=>`<div class="row"><span class="row-l">${f.l}</span><span class="row-v" style="color:var(--p);font-size:10px">${PCT(f.a)} | ded ${BRL(f.d)}</span></div>`).join('')}
    `);
  }

  html+=`</div></div>`;
  app.innerHTML=html;
}

// ─── HELPERS ───
function card(title,key,body){
  let cl=state.collapsed[key];
  return`<div class="card">
    <div class="card-h" onclick="state.collapsed.${key}=${cl?0:1};render()">
      <span class="card-title">${title}</span>
      <span style="color:var(--t2);font-size:12px">${cl?'▸':'▾'}</span>
    </div>
    ${cl?'':`<div class="card-b">${body}</div>`}
  </div>`;
}

function row(l,v,c){return`<div class="row"><span class="row-l">${l}</span><span class="row-v" style="color:${c||'var(--t0)'}">${v}</span></div>`}

function prow(l,k,v,c){
  return`<div class="inp-row"><label>${l}</label><input class="inp" type="number" step="0.1" value="${v}" style="color:${c||'var(--bl)'}" onchange="state.costs.${k}=+this.value;render()"><span style="color:var(--t2);font-size:10px;font-weight:600">%</span></div>`;
}

function irow(l,k,v,pfx){
  return`<div class="inp-row"><label>${l}</label>${pfx?`<span style="color:var(--t2);font-size:10px">${pfx}</span>`:''}<input class="inp" type="number" step="0.01" value="${v}" style="width:110px" onchange="state.costs.${k}=+this.value;render()"></div>`;
}

function bar(l,val,total,c){
  let w=total>0?Math.max((val/total)*100,0):0;
  return`<div class="bar-row"><span>${l}</span><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${c}"></div></div><span style="color:${c}">${PCTS(total>0?val/total:0)}</span></div>`;
}

function prods(items,mk,cat){
  let h='';
  if(items.length===0){
    h+=`<div class="empty">Nenhum item</div>`;
  }
  items.forEach((p,i)=>{
    let u=p.dp>0?p.v*(1-p.dp/100):p.v;
    let uv=Math.ceil(u*mk),tv=uv*p.q;
    let sl=p.mx-tv,ok=p.mx===0||sl>=0;
    h+=`<div class="prd" style="border-color:${ok?'var(--bd)':'#ff637044'}">
      <div class="prd-head">
        <div><div class="prd-name">${p.d||'Sem descricao'}</div><div class="prd-sub">${p.f||''}</div></div>
        <div style="display:flex;gap:4px;align-items:center">
          ${p.mx>0?`<span class="tag" style="background:${ok?'#00d68f22':'#ff637022'};color:${ok?'var(--g)':'var(--r)'}">${ok?'OK':'!'} ${BRL(sl)}</span>`:''}
          <button class="del-btn" onclick="state.${cat}.splice(${i},1);render()">✕</button>
        </div>
      </div>
      <div class="prd-grid">
        <div><small>QDE</small><input class="inp" type="number" min="0" value="${p.q}" style="width:100%;text-align:center" onchange="state.${cat}[${i}].q=+this.value;render()"></div>
        <div><small>CUSTO UNIT.</small><div class="val" style="color:var(--t1)">${BRL(u)}</div></div>
        <div><small>VENDA UNIT.</small><div class="val" style="color:var(--g)">${BRL(uv)}</div></div>
      </div>
      <div class="prd-foot">
        <div><small>COMPRA</small><div class="val" style="color:var(--t1)">${BRL(u*p.q)}</div></div>
        <div><small>MARKUP</small><div class="val" style="color:var(--p)">${mk.toFixed(2)}x</div></div>
        <div><small>VENDA</small><div class="val" style="color:var(--g)">${BRL(tv)}</div></div>
      </div>
    </div>`;
  });
  h+=`<button class="add-btn" onclick="state.${cat}.push({id:Date.now(),f:'',d:'',q:1,v:0,mx:0,dp:0});render()">+ Novo item</button>`;
  return h;
}

// ─── INIT ───
render();
</script>

</body>
</html>
